name: Facebook Group Sync

on:
  schedule:
    # Run every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run sync script
        env:
          FACEBOOK_EMAIL: ${{ secrets.FACEBOOK_EMAIL }}
          FACEBOOK_PASSWORD: ${{ secrets.FACEBOOK_PASSWORD }}
        run: npm start

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Facebook Sync Bot"
          git add synced_posts.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto: Update synced posts database" && git push)
        continue-on-error: true
